{{- if .Values.collector.enabled -}}
{{- $isGKE := eq (.Values.cloudProvider | default "aws") "gcp" -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "k8s-collector.name" . }}
  namespace: {{ .Values.serviceAccount.namespace }}
  labels:
    {{- include "k8s-collector.labels" . | nindent 4 }}
spec:
  schedule: "{{ .Values.collector.schedule }}"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: "Forbid"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "k8s-collector.selectorLabels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ .Values.serviceAccount.name }}
          containers:
          - name: collector
            image: "{{ .Values.collector.image.repository }}:{{ .Values.collector.image.tag }}"
            imagePullPolicy: {{ .Values.collector.image.pullPolicy }}
            {{- with .Values.collector.securityContext }}
            securityContext:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            env:
            - name: NULLIFY_S3_BUCKET_NAME
              value: "{{ .Values.collector.s3.bucket }}"
            - name: NULLIFY_S3_KEY_PREFIX
              value: "{{ .Values.collector.s3.keyPrefix }}"
            - name: AWS_REGION
              value: "{{ .Values.collector.aws.region }}"
            - name: CLUSTER_NAME
              value: "{{ .Values.collector.clusterName }}"
            {{- if $isGKE }}
            # GKE → AWS federation via sts:AssumeRoleWithWebIdentity.
            # The collector reads AWS_WEB_IDENTITY_TOKEN_FILE, forwards the
            # Google-signed SA token to AWS STS, and assumes NULLIFY_AWS_ROLE_ARN.
            - name: NULLIFY_AWS_ROLE_ARN
              value: "{{ .Values.collector.gke.nullifyAwsRoleArn }}"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "{{ .Values.collector.gke.webIdentityTokenPath }}"
            {{- end }}
            {{- if and .Values.collector.dataCollection .Values.collector.dataCollection.excludeNamespaces }}
            - name: EXCLUDE_NAMESPACES
              value: "{{ .Values.collector.dataCollection.excludeNamespaces }}"
            {{- end }}
            {{- if and .Values.collector.dataCollection .Values.collector.dataCollection.includeResources }}
            - name: INCLUDE_RESOURCES
              value: "{{ .Values.collector.dataCollection.includeResources }}"
            {{- end }}
            {{- if and .Values.collector.dataCollection .Values.collector.dataCollection.metadataOnly }}
            - name: METADATA_ONLY
              value: "true"
            {{- end }}
            {{- if .Values.collector.kms.keyArn }}
            - name: NULLIFY_KMS_KEY_ARN
              value: "{{ .Values.collector.kms.keyArn }}"
            {{- end }}
            {{- if .Values.collector.debug.enabled }}
            - name: ENABLE_DEBUG_LOG
              value: "true"
            {{- end }}
            resources:
              {{- toYaml .Values.collector.resources | nindent 14 }}
            {{- if $isGKE }}
            volumeMounts:
            - name: gcp-sa-token
              mountPath: {{ dir .Values.collector.gke.webIdentityTokenPath }}
              readOnly: true
            {{- end }}
          {{- if $isGKE }}
          volumes:
          - name: gcp-sa-token
            projected:
              sources:
              - serviceAccountToken:
                  # Audience AWS STS validates against the OIDC provider's
                  # client_id_list. Must be sts.amazonaws.com or AssumeRole
                  # is rejected.
                  audience: {{ .Values.collector.gke.audience }}
                  expirationSeconds: 3600
                  path: {{ base .Values.collector.gke.webIdentityTokenPath }}
          {{- end }}
          restartPolicy: OnFailure
{{- end }}
